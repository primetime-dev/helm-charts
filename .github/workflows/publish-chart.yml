name: Publish Flask Service Chart

on:
  push:
    branches:
      - main
    paths:
      - "charts/flask-service/**"
      - "examples/**"
      - "README.md"
      - ".github/workflows/publish-chart.yml"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint charts/flask-service

      - name: Package chart
        run: |
          mkdir -p dist
          helm package charts/flask-service --destination dist

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Push chart to GHCR
        run: helm push dist/flask-service-*.tgz oci://ghcr.io/primetime-dev/charts
