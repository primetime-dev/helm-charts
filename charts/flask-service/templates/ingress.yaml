{{- if .Values.ingress.enabled }}
{{- if eq (len .Values.ingress.hosts) 0 }}
{{- fail "ingress.hosts must contain at least one host when ingress.enabled is true" }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "flask-service.fullname" . }}
  labels:
    {{- include "flask-service.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  rules:
    {{- range $host := .Values.ingress.hosts }}
    - host: {{ required "ingress.hosts[].host is required" $host.host | quote }}
      http:
        paths:
          {{- range $path := $host.paths }}
          - path: {{ required "ingress.hosts[].paths[].path is required" $path.path | quote }}
            pathType: {{ default "Prefix" $path.pathType }}
            backend:
              service:
                name: {{ include "flask-service.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
          {{- end }}
    {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
